server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Entry point del "modo extensión" (HashRouter, no necesita fallback SPA)
    location = /extension.html {
        try_files $uri =404;
    }

    # Assets con hash en el nombre (Vite): cache agresivo, son inmutables
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # robots.txt servido tal cual (ya viene en dist/ desde public/robots.txt)
    location = /robots.txt {
        try_files $uri =404;
    }

    # Fallback SPA: cualquier ruta que no sea un archivo real, sirve index.html
    # para que React Router maneje el ruteo del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
